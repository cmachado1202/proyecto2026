<!doctype html>
<html lang="es">
  <head>

      content="Carrito de compras del Mundial de Alfajores"

    <link

      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

    <link rel="stylesheet" href="../CSS/styles.css" />

    <title>Carrito | Mundial de Alfajores</title>

  <body>
    <header>
      <div class="div-logo">
        <a href="../index.html" class="logo">
          <img src="../img/logo.png" alt="Logo Mundial de Alfajores" />
        </a>
      </div>

      <nav class="header-nav" aria-label="Navegación principal">
        <ul>
          <li><a href="../index.html">HOME</a></li>
          <li><a href="./contactos.html">CONTACTOS</a></li>
          <li>
            <a href="./carrito.html" class="carrito-icono">
              🛒
              <span
                id="contador-carrito"
                class="badge rounded-pill text-bg-light"
              >
                0
              </span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container py-4">
      <h1 class="text-center">Carrito de compras</h1>

      <section
        id="contenedor-carrito"
        class="contenedor-tarjetas"

      </section>

      <section id="resumen-carrito" aria-label="Resumen de compra">
        <!-- Total creado desde carrito.js -->
      </section>

      <div id="acciones-carrito" class="acciones-carrito">
        <!-- Botones creados desde carrito.js -->
      </div>
    </main>

    <footer>
      <p>Sitio realizado para proyecto</p>

      <nav aria-label="Redes sociales">
        <ul class="footer-list">
          <li>
            <img src="../img/whatsapp.png" alt="Logo de WhatsApp" />
          </li>
          <li>
            <img src="../img/insta.png" alt="Logo de Instagram" />
          </li>
        </ul>
      </nav>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"

    <script type="module" src="../js/carrito.js"></script>
