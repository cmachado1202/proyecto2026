<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../CSS/styles.css" />
    <title>Contactos</title>
  </head>
  <body>
    <header>
      <div class="div-logo">
        <a href="../index.html" class="logo">
          <img src="../img/logo.png" alt="Logo Mundial de Alfajores" />
        </a>
      </div>
      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">HOME</a></li>
          <li><a href="./contactos.html">CONTACTOS</a></li>
          <li>
            <a href="./carrito.html" class="carrito-icono">
              🛒 <span id="contador-carrito">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto text-secondary">Contactanos</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/mvzlwjzb"
        method="POST"
      >
        <div class="grupo-input">
          <label>
            Your email:
            <input type="email" name="email" />
          </label>
        </div>
        <div class="grupo-input">
          <label>
            Your message:
            <textarea name="message"></textarea>
          </label>
        </div>
        <!-- your other form fields go here -->
        <button type="submit">Send</button>
      </form>
    </main>
    <footer>
      <p>Sitio realizado para proyecto</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/whatsapp.png" alt="logo-whatsapp" /></li>
          <li><img src="../img/insta.png" alt="logo-instagram" /></li>
        </ul>
      </nav>
    </footer>
    <script type="module" src="../js/carrito.js"></script>
  </body>
</html>
